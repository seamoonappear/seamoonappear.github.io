# ----------------- 站点配置 -----------------

# 导入主题
theme: jekyll-theme-chirpy

# 网页语言
lang: zh-CN

# 时区设置
timezone: Asia/Shanghai

# jekyll-seo-tag 设置
title: 海上升明月
tagline: 学习，感悟，探索
description: >-
  Seamoon的技术博客，分享编程开发、技术实践和个人思考。

# 站点协议和主机名
url: "https://seamoonappear.github.io"

github:
  username: seamoonappear

# ----------------- 社交链接配置 -----------------
social:
  name: 王维
  email: 
  links:
    # 开发者平台
    - https://github.com/seamoonappear
    - https://gitee.com/你的码云用户名
    
    # 技术社区
    - https://juejin.cn/user/你的掘金ID
    - https://blog.csdn.net/你的CSDN用户名
    - https://www.zhihu.com/people/你的知乎ID
    
    # 内容平台
    - https://www.xiaohongshu.com/user/profile/你的小红书ID
    - https://www.douyin.com/user/你的抖音号
    
    # 其他平台
    - https://space.bilibili.com/你的B站ID
    - https://www.yuque.com/你的语雀用户名
    
    # RSS订阅
    - rss: /feed.xml

# ----------------- 站点验证设置 -----------------
webmaster_verifications:
  google: 
  bing: 
  alexa: 
  yandex: 
  baidu: 
  facebook: 

# ----------------- 网站分析设置 -----------------
analytics:
  google:
    id: 
  baidu:
    id: 
  goatcounter:
    id: 
  umami:
    id: 
    domain: 
  matomo:
    id: 
    domain: 
  cloudflare:
    id: 
  fathom:
    id: 

pageviews:
  provider: 

theme_mode: 

cdn: 

# ----------------- 头像 & 社交预览图 -----------------
avatar: "{{ '/assets/img/avatar.jpg' | relative_url }}"
social_preview_image: "{{ '/assets/img/preview.jpg' | relative_url }}"

toc: true

# ----------------- 评论系统配置 -----------------
comments:
  provider: cusdis
  cusdis:
    data_app_id: "a507d22b-3586-405c-a6b5-50563ba8eb75"
    host: "https://cusdis.com"
    # lang: "zh-CN"
    # theme: "auto"

# ----------------- 自托管静态资源 -----------------
assets:
  self_host:
    enabled: 
    env: 

# ----------------- PWA 设置（微信端禁用） -----------------
pwa:
  enabled: false
  cache:
    enabled: false

paginate: 10
baseurl: ""

# ----------------- Kramdown & 语法高亮 -----------------
kramdown:
  footnote_backlink: "↩︎"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# ----------------- Collections -----------------
collections:
  tabs:
    output: true
    sort_by: order

# ----------------- 默认值 -----------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

# ----------------- Archives -----------------
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/