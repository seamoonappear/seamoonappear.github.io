<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Front Matter Markdown 生成器 | Chirpy 优化版</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 text-center">🪶 Chirpy 风格 Front Matter 生成器</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- 左侧表单 -->
      <div class="space-y-4">
        <div>
          <label class="block font-semibold mb-1">标题</label>
          <input id="title" type="text" class="w-full border rounded p-2" placeholder="输入文章标题">
        </div>
        <div>
          <label class="block font-semibold mb-1">Slug（可选）</label>
          <input id="slug" type="text" class="w-full border rounded p-2" placeholder="自动生成或自定义">
        </div>
        <div>
          <label class="block font-semibold mb-1">正文内容</label>
          <textarea id="content" rows="8" class="w-full border rounded p-2" placeholder="输入正文"></textarea>
        </div>
        <div class="flex items-center justify-between">
          <button id="generate-btn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">🪄 生成分类与标签</button>
          <button id="clear-btn" class="text-gray-500 border px-3 py-2 rounded hover:bg-gray-100">清空</button>
        </div>
        <div>
          <label class="block font-semibold mb-1">分类（自动生成，可修改）</label>
          <input id="categories" type="text" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block font-semibold mb-1">标签（自动生成，可修改）</label>
          <input id="tags" type="text" class="w-full border rounded p-2">
        </div>
      </div>

      <!-- 右侧输出 -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-xl font-semibold">📝 生成结果</h2>
          <div class="space-x-2">
            <button id="copy-btn" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">复制 Markdown</button>
            <button id="download-btn" class="bg-purple-600 text-white px-3 py-1 rounded hover:bg-purple-700">下载 .md 文件</button>
          </div>
        </div>
        <p class="text-sm text-gray-500 mb-2">文件路径：<span id="filename" class="font-mono"></span></p>
        <textarea id="markdown" readonly rows="25" class="w-full border rounded p-2 font-mono text-sm bg-gray-50"></textarea>
      </div>
    </div>
  </div>

  <script>
    const titleEl = document.getElementById('title');
    const slugEl = document.getElementById('slug');
    const contentEl = document.getElementById('content');
    const categoriesEl = document.getElementById('categories');
    const tagsEl = document.getElementById('tags');
    const markdownEl = document.getElementById('markdown');
    const filenameEl = document.getElementById('filename');

    // 辅助函数：时间与slug
    function formatDate(date = new Date()) {
      return date.toISOString().slice(0, 19).replace('T', ' ') + ' +0800';
    }
    function getSlug(title) {
      return title.trim()
        .toLowerCase()
        .replace(/[^\w\u4e00-\u9fa5]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    // 自动生成分类与标签
    function autoGenerateMeta() {
      const text = (titleEl.value + ' ' + contentEl.value).toLowerCase();
      let cats = [];
      if (/jekyll|html|css|javascript|python|代码/.test(text)) cats = ['技术', '博客'];
      else if (/旅行|生活|日记/.test(text)) cats = ['生活', '随笔'];
      else if (/诗|小说|随笔/.test(text)) cats = ['文学', '创作'];
      else cats = ['杂谈', '思考'];

      const words = text.split(/[^a-zA-Z0-9\u4e00-\u9fa5]+/).filter(w => w.length > 1);
      const freq = {};
      words.forEach(w => freq[w] = (freq[w] || 0) + 1);
      const sorted = Object.keys(freq).sort((a, b) => freq[b] - freq[a]);
      const tags = sorted.slice(0, 3);

      categoriesEl.value = cats.join(', ');
      tagsEl.value = tags.join(', ');
    }

    // 主生成函数
    function generateMarkdown() {
      const title = titleEl.value.trim();
      const slug = slugEl.value.trim() || getSlug(title);
      const content = contentEl.value.trim();
      const categories = categoriesEl.value.split(',').map(c => c.trim()).filter(Boolean);
      const tags = tagsEl.value.split(',').map(t => t.trim()).filter(Boolean);
      const date = formatDate();
      const summary = content.slice(0, 80).replace(/\n/g, ' ');
      const description = summary || '（请填写文章摘要）';
      const filename = `${new Date().toISOString().slice(0,10)}-${slug || 'your-post'}.md`;

      const fm = `---\n` +
`title: ${title || '未命名文章'}\n` +
`date: ${date}\n` +
`categories: [${categories.join(', ')}]\n` +
`tags: [${tags.join(', ')}]\n` +
`description: >-\n  ${description}\n` +
`image:\n  path: /assets/img/\n  alt: 封面图\n` +
`pin: false\nmath: false\nmermaid: false\n---\n\n`;

      const md = `${fm}## 简介\n\n${summary}\n\n---\n\n## 正文\n\n${content}\n`;
      markdownEl.value = md;
      filenameEl.textContent = filename;
    }

    // 文件下载函数
    function downloadMarkdown() {
      const blob = new Blob([markdownEl.value], { type: 'text/markdown;charset=utf-8' });
      const a = document.createElement('a');
      const filename = filenameEl.textContent || 'new-post.md';
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // 事件绑定
    document.getElementById('generate-btn').addEventListener('click', () => {
      autoGenerateMeta();
      generateMarkdown();
    });
    document.getElementById('copy-btn').addEventListener('click', () => {
      markdownEl.select();
      document.execCommand('copy');
      alert('已复制到剪贴板 ✅');
    });
    document.getElementById('download-btn').addEventListener('click', downloadMarkdown);
    document.getElementById('clear-btn').addEventListener('click', () => {
      titleEl.value = '';
      slugEl.value = '';
      contentEl.value = '';
      categoriesEl.value = '';
      tagsEl.value = '';
      markdownEl.value = '';
      filenameEl.textContent = '';
    });

    [titleEl, slugEl, contentEl].forEach(el => el.addEventListener('input', generateMarkdown));
  </script>
</body>
</html>
