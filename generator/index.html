<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chirpy Front Matter 生成器 | 图片开关+分类优化</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 text-center">🪶 Chirpy 风格 Front Matter 生成器（图片可选 + 分类优化）</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- 左侧输入 -->
      <div class="space-y-4">
        <div>
          <label class="block font-semibold mb-1">标题</label>
          <input id="title" type="text" class="w-full border rounded p-2" placeholder="输入文章标题">
        </div>
        <div>
          <label class="block font-semibold mb-1">Slug（可选）</label>
          <input id="slug" type="text" class="w-full border rounded p-2" placeholder="自动生成或自定义">
        </div>
        <div>
          <label class="block font-semibold mb-1">正文内容</label>
          <textarea id="content" rows="8" class="w-full border rounded p-2" placeholder="输入正文"></textarea>
        </div>
        <div>
          <label class="block font-semibold mb-1">分类</label>
          <select id="categories" multiple class="w-full border rounded p-2">
            <option value="工作">工作</option>
            <option value="生活">生活</option>
            <option value="情感">情感</option>
            <option value="爱好">爱好</option>
            <option value="感悟">感悟</option>
            <option value="探索">探索</option>
            <option value="学习">学习</option>
            <option value="读书">读书</option>
            <option value="影视">影视</option>
          </select>
          <p class="text-sm text-gray-500 mt-1">按住 Ctrl / Command 可多选</p>
        </div>
        <div>
          <label class="block font-semibold mb-1">标签（2~3 个，自动生成，可修改）</label>
          <input id="tags" type="text" class="w-full border rounded p-2" placeholder="如：Jekyll, Chirpy, 博客">
        </div>

        <!-- 图片可选部分 -->
        <div>
          <label class="flex items-center space-x-2 mb-2">
            <input id="use-image" type="checkbox" class="w-4 h-4">
            <span class="font-semibold">启用封面图片</span>
          </label>
          <input id="image-url" type="text" class="w-full border rounded p-2 hidden" placeholder="输入图片 URL，将插在文章最前">
        </div>

        <div class="flex items-center gap-2">
          <button id="generate-btn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">🪄 生成 Markdown</button>
          <button id="clear-btn" class="text-gray-500 border px-3 py-2 rounded hover:bg-gray-100">清空</button>
        </div>
      </div>

      <!-- 右侧输出 -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-xl font-semibold">📝 生成结果</h2>
          <div class="space-x-2">
            <button id="copy-btn" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">复制 Markdown</button>
            <button id="copy-filename-btn" class="bg-yellow-600 text-white px-3 py-1 rounded hover:bg-yellow-700">复制 posts 文件名</button>
            <button id="download-btn" class="bg-purple-600 text-white px-3 py-1 rounded hover:bg-purple-700">下载 .md 文件</button>
          </div>
        </div>
        <p class="text-sm text-gray-500 mb-2">文件路径：<span id="filename" class="font-mono"></span></p>
        <textarea id="markdown" readonly rows="20" class="w-full border rounded p-2 font-mono text-sm bg-gray-50"></textarea>
        <div class="mt-4">
          <label class="block font-semibold mb-1">图片预览：</label>
          <img id="image-preview" class="w-full max-h-64 object-contain border rounded p-2 bg-white" src="" alt="封面预览" style="display:none;">
        </div>
      </div>
    </div>
  </div>

  <script>
    const titleEl = document.getElementById('title');
    const slugEl = document.getElementById('slug');
    const contentEl = document.getElementById('content');
    const categoriesEl = document.getElementById('categories');
    const tagsEl = document.getElementById('tags');
    const useImageEl = document.getElementById('use-image');
    const imageUrlEl = document.getElementById('image-url');
    const markdownEl = document.getElementById('markdown');
    const filenameEl = document.getElementById('filename');
    const imagePreview = document.getElementById('image-preview');

    useImageEl.addEventListener('change', () => {
      imageUrlEl.classList.toggle('hidden', !useImageEl.checked);
      if (!useImageEl.checked) {
        imageUrlEl.value = '';
        imagePreview.style.display = 'none';
      }
    });

    function formatDate(date = new Date()) {
      return date.toISOString().slice(0,19).replace('T',' ') + ' +0800';
    }

    function getSlug(title){
      return title.trim().toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g,'-').replace(/^-+|-+$/g,'');
    }

    function autoGenerateTags() {
      const text = (titleEl.value + ' ' + contentEl.value).toLowerCase();
      const words = text.split(/[^a-zA-Z0-9\u4e00-\u9fa5]+/).filter(w => w.length>1);
      const freq = {};
      words.forEach(w => freq[w]=(freq[w]||0)+1);
      const sorted = Object.keys(freq).sort((a,b)=>freq[b]-freq[a]);
      return sorted.slice(0,3);
    }

    function generateMarkdown(){
      const title = titleEl.value.trim() || '未命名文章';
      const slug = slugEl.value.trim() || getSlug(title) || 'post';
      const content = contentEl.value.trim();
      const selectedCats = Array.from(categoriesEl.selectedOptions).map(o=>o.value);
      const cats = selectedCats.length ? selectedCats : ['杂谈'];
      const tags = tagsEl.value ? tagsEl.value.split(',').map(t=>t.trim()) : autoGenerateTags();
      const date = formatDate();
      const summary = content.slice(0,80).replace(/\n/g,' ');
      const description = summary || '（请填写文章摘要）';
      const filename = `_posts/${new Date().toISOString().slice(0,10)}-${slug}.md`;
      filenameEl.textContent = filename;

      let fm = `---\n`+
`title: ${title}\n`+
`date: ${date}\n`+
`categories: [${cats.join(', ')}]\n`+
`tags: [${tags.join(', ')}]\n`+
`description: >-\n  ${description}\n`;

      let imgMarkdown = '';
      const imgUrl = imageUrlEl.value.trim();
      if(useImageEl.checked && imgUrl) {
        fm += `image:\n  path: ${imgUrl}\n  alt: 封面图\n`;
        imgMarkdown = `![封面图](${imgUrl})\n\n`;
        imagePreview.src = imgUrl;
        imagePreview.style.display = 'block';
      } else {
        imagePreview.style.display = 'none';
      }

      fm += `pin: false\nmath: false\nmermaid: false\n---\n\n`;

      markdownEl.value = `${fm}${imgMarkdown}## 简介\n\n${summary}\n\n---\n\n## 正文\n\n${content}\n`;
    }

    function downloadMarkdown(){
      const blob = new Blob([markdownEl.value], {type:'text/markdown;charset=utf-8'});
      const a=document.createElement('a');
      const fname = filenameEl.textContent || 'new-post.md';
      a.href = URL.createObjectURL(blob);
      a.download = fname;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function copyToClipboard(text){
      navigator.clipboard.writeText(text).then(()=>alert('已复制 ✅'));
    }

    document.getElementById('generate-btn').addEventListener('click', generateMarkdown);
    document.getElementById('download-btn').addEventListener('click', downloadMarkdown);
    document.getElementById('copy-btn').addEventListener('click', ()=>copyToClipboard(markdownEl.value));
    document.getElementById('copy-filename-btn').addEventListener('click', ()=>copyToClipboard(filenameEl.textContent));
    document.getElementById('clear-btn').addEventListener('click', ()=>{
      titleEl.value=''; slugEl.value=''; contentEl.value=''; tagsEl.value=''; imageUrlEl.value='';
      useImageEl.checked=false; imageUrlEl.classList.add('hidden');
      Array.from(categoriesEl.options).forEach(o=>o.selected=false);
      markdownEl.value=''; filenameEl.textContent=''; imagePreview.style.display='none';
    });

    [titleEl, slugEl, contentEl, imageUrlEl].forEach(el=>el.addEventListener('input', generateMarkdown));
  </script>
</body>
</html>
