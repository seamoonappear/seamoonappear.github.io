# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage
lang: zh-CN

# Change to your timezone
timezone: Asia/Shanghai

# jekyll-seo-tag settings
# ↓ --------------------------

title: 海上升明月
tagline: 学习，感悟，探索
description: >-
  Seamoon的技术博客，分享编程开发、技术实践和个人思考。

# Fill in the protocol & hostname for your site
url: "https://seamoonappear.github.io"

github:
  username: seamoonappear

# 社交链接配置 - 国内平台优化
social:
  name: 王维
  email: # 留空或填写您的邮箱
  links:
    # 开发者平台
    - https://github.com/seamoonappear
    - https://gitee.com/你的码云用户名 # 请替换为您的码云地址
    
    # 技术社区
    - https://juejin.cn/user/你的掘金ID # 请替换为您的掘金地址
    - https://blog.csdn.net/你的CSDN用户名 # 请替换为您的CSDN地址
    - https://www.zhihu.com/people/你的知乎ID # 请替换为您的知乎地址
    
    # 内容平台
    - https://www.xiaohongshu.com/user/profile/你的小红书ID # 请替换为您的小红书地址
    - https://www.douyin.com/user/你的抖音号 # 请替换为您的抖音地址
    
    # 其他平台
    - https://space.bilibili.com/你的B站ID # 请替换为您的B站地址
    - https://www.yuque.com/你的语雀用户名 # 请替换为您的语雀地址
    
    # RSS订阅
    - rss: /feed.xml

# Site Verification Settings
webmaster_verifications:
  google: # 如需使用请填写
  bing: # 如需使用请填写
  alexa: # 如需使用请填写
  yandex: # 如需使用请填写
  baidu: # 如需百度验证请填写
  facebook: # 如需使用请填写

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# Web Analytics Settings
analytics:
  google:
    id: # 如需使用Google Analytics请填写
  baidu: # 百度统计
    id: # 如需使用百度统计请填写
  goatcounter:
    id: # 如需使用请填写
  umami:
    id: # 如需使用请填写
    domain: # 如需使用请填写
  matomo:
    id: # 如需使用请填写
    domain: # 如需使用请填写
  cloudflare:
    id: # 如需使用请填写
  fathom:
    id: # 如需使用请填写

# Page views settings
pageviews:
  provider: # 目前仅支持 'goatcounter'

# Prefer color scheme setting
theme_mode: # [light | dark] 留空则跟随系统

# The CDN endpoint for media resources
cdn:

# the avatar on sidebar, support local or CORS resources
avatar: /assets/img/avatar.jpg

# The URL of the site-wide social preview image used in SEO `og:image` meta tag
social_preview_image: # 字符串，本地或CORS资源

# boolean type, the global switch for TOC in posts
toc: true

# 评论系统配置
comments:
  # Global switch for the post-comment system
  provider: giscus # [disqus | utterances | giscus] 推荐使用giscus
  # The provider options are as follows:
  disqus:
    shortname: # 如需使用Disqus请填写
  # utterances settings
  utterances:
    repo: seamoonappear/seamoonappear.github.io
    issue_term: pathname
  # Giscus options - 推荐配置
  giscus:
    repo: seamoonappear/seamoonappear.github.io
    repo_id: # 需要在Giscus官网获取
    category: Announcements
    category_id: # 需要在Giscus官网获取
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: zh-CN
    reactions_enabled: 1

# Self-hosted static assets
assets:
  self_host:
    enabled: # 布尔值，留空表示false
    env: # [development | production]

# PWA设置
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:
      # - "/example"

# 分页设置
paginate: 10

# The base URL of your site
baseurl: ""

# ------------ 以下选项不建议修改 ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/