# 网站配置文件

# 导入主题
theme: jekyll-theme-chirpy

# 网页语言 › http://www.lingoes.net/en/translator/langcode.htm
# 如果与 `_data/locales` 文件夹中的某个文件名相同，布局语言也会更改，
# 否则，布局语言将使用默认值 'zh-CN'。
lang: zh-CN

# 更改为您的时区 › https://kevinnovak.github.io/Time-Zone-Picker
timezone: Asia/Shanghai

# jekyll-seo-tag 设置 › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: 王维博客 # 主标题

tagline: 学习,感悟,探索 # 将显示为副标题

description: >- # 用于 SEO 元数据和 atom feed
  王维的个人博客 - 分享技术学习心得、生活感悟和探索发现。

# 填写您网站的协议和主机名。
# 例如 'https://username.github.io'，注意不要以 '/' 结尾。
url: "https://seamoonappear.github.io"

github:
  username: github_username # 更改为您的 GitHub 用户名

twitter:
  username: twitter_username # 更改为您的 Twitter 用户名

social:
  # 更改为您的全名。
  # 它将显示为文章的默认作者和页脚的版权所有者
  name: 王维
  email: example@domain.com # 更改为您的邮箱地址
  links:
    # 第一个元素作为版权所有者的链接
    - https://twitter.com/username # 更改为您的 Twitter 主页
    - https://github.com/username # 更改为您的 GitHub 主页
    # 取消注释以添加更多社交链接
    # - https://www.facebook.com/username
    # - https://www.linkedin.com/in/username

# 网站验证设置
webmaster_verifications:
  google: # 填写您的 Google 验证码
  bing: # 填写您的 Bing 验证码
  alexa: # 填写您的 Alexa 验证码
  yandex: # 填写您的 Yandex 验证码
  baidu: # 填写您的百度验证码
  facebook: # 填写您的 Facebook 验证码

# ↑ --------------------------
# `jekyll-seo-tag` 设置结束

# 网站分析设置
analytics:
  google:
    id: # 填写您的 Google Analytics ID
  goatcounter:
    id: # 填写您的 GoatCounter ID
  umami:
    id: # 填写您的 Umami ID
    domain: # 填写您的 Umami 域名
  matomo:
    id: # 填写您的 Matomo ID
    domain: # 填写您的 Matomo 域名
  cloudflare:
    id: # 填写您的 Cloudflare Web Analytics token
  fathom:
    id: # 填写您的 Fathom Site ID

# 页面浏览量设置
pageviews:
  provider: # 目前仅支持 'goatcounter'

# 首选颜色方案设置
#
# 注意：保持为空将默认跟随系统首选颜色，
# 并且会在侧边栏左下角有一个切换按钮来在深色和浅色主题之间切换。
#
# 可用选项：
#
#     light — 使用浅色方案
#     dark — 使用深色方案
#
theme_mode: # [light | dark]

# 媒体资源的 CDN 端点。
# 注意：一旦指定，CDN url 将添加到所有以 '/' 开头的媒体资源路径中
#（网站头像、文章图片、音频和视频文件）
#
# 例如 'https://cdn.com'
cdn:

# 侧边栏头像，支持本地或 CORS 资源
avatar: /assets/img/avatar.jpg

# 在 SEO `og:image` 元标签中使用的全站社交预览图片的 URL。
# 可以通过 front matter 中的自定义 `page.image` 覆盖。
social_preview_image: # 字符串，本地或 CORS 资源

# 布尔类型，文章中目录的全局开关。
toc: true

comments:
  # 文章评论系统的全局开关。保持为空表示禁用。
  provider: # [disqus | utterances | giscus]
  # 提供者选项如下：
  disqus:
    shortname: # 填写 Disqus shortname › https://help.disqus.com/en/articles/1717111-what-s-a-shortname
  # utterances 设置 › https://utteranc.es/
  utterances:
    repo: # <gh-用户名>/<仓库>
    issue_term: # < url | pathname | title | ...>
  # Giscus 选项 › https://giscus.app
  giscus:
    repo: # <gh-用户名>/<仓库>
    repo_id:
    category:
    category_id:
    mapping: # 可选，默认为 'pathname'
    strict: # 可选，默认为 '0'
    input_position: # 可选，默认为 'bottom'
    lang: # 可选，默认为 `site.lang` 的值
    reactions_enabled: # 可选，默认为 `1`

# 自托管静态资源，可选 › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: # 布尔值，保持为空表示 false
    # 指定 Jekyll 环境，空表示两者都适用
    # 仅在 `assets.self_host.enabled` 为 'true' 时有效
    env: # [development | production]

pwa:
  enabled: true # PWA 功能选项（可安装）
  cache:
    enabled: true # PWA 离线缓存选项
    # 此处定义的路径将被排除在 PWA 缓存之外。
    # 通常其值是另一个共享相同域名的网站的 `baseurl`。
    deny_paths:
      # - "/example"  # 匹配 `<SITE_URL>/example/*` 的 URL 将不会被 PWA 缓存

paginate: 5

# 您网站的基本 URL
baseurl: ""

# ------------ 以下选项不建议修改 ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge 选项 › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # 此处空字符串表示项目中的所有文件
      type: posts
    values:
      layout: post
      comments: true # 在文章中启用评论
      toc: true # 在文章中显示目录列
      # 除非您有足够信心更新此项目中所有其他文章链接的代码，否则不要修改以下参数
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # 参见 `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
