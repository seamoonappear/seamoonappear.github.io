# 站点基础配置
title: "海上升明月"                    # 站点标题
tagline: "站点的副标题或简短描述"         # 站点副标题
description: "您站点的详细描述，用于SEO和搜索结果展示" # 站点描述
url: "https://seamoonappear.github.io"    # 替换为您的实际域名
baseurl: ""                              # 如果站点不在根目录，请设置子路径
github:
  username: "seamoonappear"               # 替换为您的 GitHub 用户名

# 主题配置
theme: jekyll-theme-chirpy
remote_theme: "cotes2020/jekyll-theme-chirpy" # 如果使用远程主题

# 语言和地区设置
lang: zh-CN
timezone: Asia/Shanghai

# 个人资料
avatar: /assets/img/avatar.png           # 头像路径，建议放在assets/img目录
twitter: yourtwitterusername             # 可选
email: your-email@example.com            # 可选

# 社交链接 (显示在侧边栏)
social:
  name: "王维"
  links:
    - https://github.com/yourusername
    - https://gitee.com/yourusername     # 码云，可选
    - https://juejin.cn/user/yourid      # 掘金，可选
    - https://www.zhihu.com/people/yourid # 知乎，可选
    - rss: /feed.xml                     # RSS订阅

# 评论系统配置 (Giscus推荐)
comments:
  active: giscus                         # 评论系统: giscus, utterances, disqus
  giscus:
    repo: seamoonappear/seamoonappear.github.io  # 替换为您的仓库
    repo_id: YOUR_REPO_ID                # 需要在Giscus官网获取
    category: "Announcements"
    category_id: YOUR_CATEGORY_ID        # 需要在Giscus官网获取
    mapping: pathname
    reactions-enabled: 1
    emit-metadata: 0
    input-position: bottom
    lang: zh-CN
    theme: light                         # 主题: light, dark, dark_dimmed等

# 统计和分析
analytics:
  google: 
    id: "G-XXXXXXXXXX"                   # Google Analytics ID，可选
  baidu:                                # 百度统计，可选
    id: "your_baidu_tongji_id"

# 搜索配置
search:
  provider: algolia                      # 搜索引擎: algolia, lunr
  algolia:
    app_id: YOUR_APP_ID                  # Algolia应用ID
    api_key: YOUR_API_KEY                # Algolia API密钥
    index_name: YOUR_INDEX_NAME          # 索引名称

# 页面设置
defaults:
  - scope:
      path: ""                           # 空字符串表示所有文件
      type: posts                        # 应用于posts类型
    values:
      layout: post
      comments: true                     # 默认开启评论
      share: true                        # 默认开启分享
  - scope:
      path: ""
      type: pages                        # 应用于pages类型
    values:
      layout: page

# 归档设置
archives:
  - type: year
    format: annual
  - type: month
    format: monthly
  - type: day
    format: daily

# 分类和标签
category_archive:
  type: category
  path: categories

tag_archive:
  type: tag
  path: tags

# 分页设置
paginate: 10
paginate_path: /page/:num/

# 插件配置
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-paginate
  - jekyll-include-cache

# Jekyll Archives配置 (用于分类和标签页面)
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# SEO优化
seo:
  type: Website                         # 或 Blog
  twitter:
    card: summary
    username: yourtwitterusername       # 可选

# 分享平台配置 (引用_data/share.yml中的设置)
share:
  platforms:
    - 微博
    - QQ
    - 微信
    # - Twitter  # 如需要国际平台可取消注释
    # - Facebook

# 外观和样式
theme_mode: light                       # 主题模式: light, dark, auto
toc: true                               # 文章目录
readtime: true                          # 阅读时间估计

# 代码高亮
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# 构建设置
markdown: kramdown
permalink: /posts/:title/
permalink: pretty
exclude:
  - "*.gem"
  - ".gitignore"
  - ".ruby-version"
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "vendor/bundle/"
  - "vendor/cache/"
  - "vendor/gems/"
  - "vendor/ruby/"

# 时区配置
future: true

# 图片路径配置
img_cdn: ""                             # 如果使用CDN，可在此设置基础URL

# RSS订阅
feed:
  path: feed.xml
  template: feed.xml