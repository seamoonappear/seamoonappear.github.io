<div id="cusdis_thread"
  data-host="https://cusdis.com"
  data-app-id="a507d22b-3586-405c-a6b5-50563ba8eb75"
  data-page-id="{{ page.id | default: page.url | url_encode }}"
  data-page-url="{{ page.url | absolute_url }}"
  data-page-title="{{ page.title }}"
  style="overflow: hidden !important; height: auto !important; max-height: none !important;"
></div>
<script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
<script>
  window.CUSDIS_LOCALE = {
    powered_by: "评论由 Cusdis 提供",
    post_comment: "发送评论",
    loading: "加载中",
    email: "邮箱地址 (可选)",
    nickname: "昵称",
    reply_placeholder: "回复内容...",
    reply_btn: "回复",
    sending: "发送中...",
    mod_badge: "管理员",
    content_is_required: "内容不能为空",
    nickname_is_required: "昵称不能为空",
    comment_has_been_sent: "评论已发送，管理员审核通过后会展示"
  };
  
  // 额外的滚动条移除脚本
  document.addEventListener('DOMContentLoaded', function() {
    function forceRemoveScroll() {
      const elements = document.querySelectorAll('#cusdis_thread, #cusdis_thread *');
      elements.forEach(el => {
        el.style.overflow = 'hidden';
        el.style.overflowX = 'hidden';
        el.style.overflowY = 'hidden';
      });
    }
    
    forceRemoveScroll();
    setInterval(forceRemoveScroll, 1000);
  });
</script>
