# 站点配置

# 导入主题
theme: jekyll-theme-chirpy

# 网页语言
lang: zh-CN

# 时区设置
timezone: Asia/Shanghai

# jekyll-seo-tag 设置
title: 海上升明月
tagline: 学习，感悟，探索
description: >-
  Seamoon的技术博客，分享编程开发、技术实践和个人思考。

# 站点协议和主机名
url: "https://seamoonappear.github.io"

github:
  username: seamoonappear

# 社交链接配置 - 国内平台优化
social:
  name: 王维
  email: # 留空或填写您的邮箱
  links:
    # 开发者平台
    - https://github.com/seamoonappear
    - https://gitee.com/你的码云用户名 # 请替换为您的码云地址

    # 技术社区
    - https://juejin.cn/user/你的掘金ID # 请替换为您的掘金地址
    - https://blog.csdn.net/你的CSDN用户名 # 请替换为您的CSDN地址
    - https://www.zhihu.com/people/你的知乎ID # 请替换为您的知乎地址

    # 内容平台
    - https://www.xiaohongshu.com/user/profile/你的小红书ID # 请替换为您的小红书地址
    - https://www.douyin.com/user/你的抖音号 # 请替换为您的抖音地址

    # 其他平台
    - https://space.bilibili.com/你的B站ID # 请替换为您的B站地址
    - https://www.yuque.com/你的语雀用户名 # 请替换为您的语雀地址

    # RSS订阅
    - rss: /feed.xml

# 站点验证设置
webmaster_verifications:
  google: # 如需使用请填写
  bing:   # 如需使用请填写
  alexa:  # 如需使用请填写
  yandex: # 如需使用请填写
  baidu:  # 如需百度验证请填写
  facebook: # 如需使用请填写

# 网站分析设置
analytics:
  google:
    id: # 如需使用Google Analytics请填写
  baidu: # 百度统计
    id: # 如需使用百度统计请填写
  goatcounter:
    id: # 如需使用请填写
  umami:
    id: # 如需使用请填写
    domain: # 如需使用请填写
  matomo:
    id: # 如需使用请填写
    domain: # 如需使用请填写
  cloudflare:
    id: # 如需使用请填写
  fathom:
    id: # 如需使用请填写

# 页面浏览统计设置
pageviews:
  provider: # 目前仅支持 'goatcounter'

# 主题色彩模式偏好
theme_mode: # [light | dark] 留空则跟随系统

# 媒体资源的CDN端点
cdn:

# 侧边栏头像，支持本地或CORS资源
avatar: /assets/img/avatar.jpg

# 用于SEO og:image 元标签的全站社交预览图片URL
social_preview_image: # 字符串，本地或CORS资源

# 布尔值，控制文章中是否显示目录的全局开关
toc: true

# 评论系统配置 - 已更新为Cusdis
comments:
  provider: cusdis # 使用cusdis作为评论系统 [cusdis | disqus | utterances | giscus]
  cusdis:
    data_app_id: "a507d22b-3586-405c-a6b5-50563ba8eb75" # 替换为您的Cusdis应用ID
    host: "https://cusdis.com" # Cusdis服务地址
    # lang: "zh-CN" # 评论框语言，可设置为中文
    # theme: "auto" # 主题，可选 'light', 'dark' 或 'auto'

# 自托管静态资源
assets:
  self_host:
    enabled: # 布尔值，留空表示false
    env: # [development | production]

# PWA设置
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:
      # - "/example"

# 分页设置
paginate: 10

# 站点的基本URL
baseurl: ""

# ------------ 以下选项不建议修改 ------------------

kramdown:
  footnote_backlink: "↩︎"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/