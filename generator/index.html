<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Front Matter Markdown 生成器</title>
  <style>
    body {
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f9fafb;
      color: #111;
      margin: 0;
      padding: 2rem;
    }
    h1 { text-align: center; margin-bottom: 1rem; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    textarea, input, select {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 1rem;
    }
    label { font-weight: bold; display: block; margin-top: 0.5rem; }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:hover { background: #1e40af; }
    .output { background: #fff; border: 1px solid #ddd; padding: 1rem; border-radius: 8px; }
    .filename { font-family: monospace; background: #eef2ff; padding: 0.4rem; border-radius: 4px; display: inline-block; }
    .actions { margin-top: 1rem; display: flex; gap: 1rem; }
    .checkbox-inline { display: flex; align-items: center; gap: 0.3rem; }
  </style>
</head>
<body>
  <h1>📝 Front Matter Markdown 生成器（Jekyll · Chirpy 风格）</h1>

  <div class="container">
    <div>
      <label>标题</label>
      <input type="text" id="title" placeholder="请输入文章标题">

      <label>内容</label>
      <textarea id="content" rows="12" placeholder="请输入正文内容"></textarea>

      <label>分类</label>
      <select id="category">
        <option value="工作">工作</option>
        <option value="生活">生活</option>
        <option value="情感">情感</option>
        <option value="爱好">爱好</option>
        <option value="感悟">感悟</option>
        <option value="探索">探索</option>
        <option value="学习">学习</option>
        <option value="读书">读书</option>
        <option value="影视">影视</option>
      </select>

      <label>图片选项</label>
      <div class="checkbox-inline">
        <input type="checkbox" id="addImage" />
        <label for="addImage" style="margin: 0;">插入封面图片</label>
      </div>
      <input type="text" id="imagePath" placeholder="输入图片文件名（例如 cover.webp ）" disabled />

      <div class="actions">
        <button onclick="generateAll()">生成 Markdown</button>
        <button onclick="copyMarkdown()">复制 Markdown</button>
      </div>
    </div>

    <div class="output">
      <p><strong>📄 文件名：</strong> <span id="filename" class="filename"></span></p>
      <button onclick="copyFilename()">复制文件名</button>
      <pre id="markdownOutput"></pre>
    </div>
  </div>

  <script>
    const titleEl = document.getElementById('title');
    const contentEl = document.getElementById('content');
    const categoryEl = document.getElementById('category');
    const addImageEl = document.getElementById('addImage');
    const imagePathEl = document.getElementById('imagePath');
    const filenameEl = document.getElementById('filename');
    const markdownEl = document.getElementById('markdownOutput');

    addImageEl.addEventListener('change', () => {
      imagePathEl.disabled = !addImageEl.checked;
    });

    function slugify(text) {
      return text.toString().toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\w\-]+/g, '')
        .replace(/\-\-+/g, '-')
        .replace(/^-+/, '')
        .replace(/-+$/, '');
    }

    function generateAll() {
      const title = titleEl.value.trim();
      const content = contentEl.value.trim();
      const category = categoryEl.value;
      const slug = slugify(title);
      const now = new Date();
      const date = now.toISOString().slice(0, 19).replace('T', ' ');
      const dateOnly = now.toISOString().slice(0, 10);
      const filename = `_posts/${dateOnly}-${slug || 'your-post'}.md`;

      let fm = `---\n`;
      fm += `title: ${title || '未命名文章'}\n`;
      fm += `date: ${date}\n`;
      fm += `last_modified_at: ${date}\n`;
      fm += `categories: [${category}]\n`;
      fm += `tags: []\n`;
      fm += `description: >-\n  ${content.slice(0, 40) || '暂无摘要'}\n`;

      if (addImageEl.checked && imagePathEl.value.trim() !== '') {
        fm += `image:\n  path: /assets/img/${imagePathEl.value.trim()}\n`;
      }

      fm += `pin: false\nmath: false\nmermaid: false\n---\n\n`;

      let mdContent = "";

      if (addImageEl.checked && imagePathEl.value.trim() !== '') {
        mdContent += `![封面](/assets/img/${imagePathEl.value.trim()})\n\n`;
      }

      mdContent += `## 简介\n\n${content.slice(0, 60) || '（这里写文章简介）'}\n\n---\n\n## 正文\n\n${content}\n`;

      markdownEl.textContent = fm + mdContent;
      filenameEl.textContent = filename;
    }

    function copyMarkdown() {
      navigator.clipboard.writeText(markdownEl.textContent);
      alert("✅ Markdown 已复制！");
    }

    function copyFilename() {
      navigator.clipboard.writeText(filenameEl.textContent);
      alert("✅ 文件名已复制！");
    }
  </script>
</body>
</html>
