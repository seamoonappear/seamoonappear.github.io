name: "Build and Deploy"

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 使用v4是正确且最新的[citation:2]

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3 # 建议升级Ruby版本至3.3以确保兼容性[citation:2]
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: "production"

      - name: Setup Pages
        uses: actions/configure-pages@v5 # 关键修正：升级至v5版本[citation:2]

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # 关键修正：根据GitHub要求，应升级至v4版本[citation:2]
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 使用v4是正确且最新的[citation:2]
